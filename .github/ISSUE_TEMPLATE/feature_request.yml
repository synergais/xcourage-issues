name: Feature Request
description: Suggest a new feature or improvement for xcourage
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like and why.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What workflow does it improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you envision this working?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought of.
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Which platform(s)?
      multiple: true
      options:
        - macOS
        - Linux
        - Windows
        - All / not platform-specific
    validations:
      required: false

